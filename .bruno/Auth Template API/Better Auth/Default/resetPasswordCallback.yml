info:
  name: resetPasswordCallback
  type: http
  seq: 19
  tags:
    - Default

http:
  method: GET
  url: "{{baseUrl}}/reset-password/:token"
  params:
    - name: token
      value: ""
      type: path
      description: The token to reset the password
    - name: callbackURL
      value: ""
      type: query
      description: The URL to redirect the user to reset their password
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

